<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="%BASE_URL%brand/learn-frontend-everyday-root-mark-transparent.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn Frontend Everyday</title>
  </head>
  <body>
    <div id="root">
      <div
        id="splash-screen"
        style="
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background-color: #f1f2f4;
          z-index: 9999;
        "
      >
        <div
          style="
            width: 24px;
            height: 24px;
            border: 3px solid #e2e8f0;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
          "
        ></div>
      </div>
      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>
    <script>
      ;(function () {
        const base_path = '%BASE_URL%'.replace(/\/$/, '')
        const url = new URL(window.location.href)
        const redirect_path = url.searchParams.get('p')
        const redirect_query = url.searchParams.get('q')
        const redirect_hash = url.searchParams.get('h')

        if (!redirect_path) {
          return
        }

        url.searchParams.delete('p')
        url.searchParams.delete('q')
        url.searchParams.delete('h')

        const preserved_query = url.searchParams.toString()
        const next_search = redirect_query
          ? `?${redirect_query}${preserved_query ? `&${preserved_query}` : ''}`
          : preserved_query
            ? `?${preserved_query}`
            : ''
        const next_hash = redirect_hash ? `#${redirect_hash}` : ''

        window.history.replaceState(
          null,
          '',
          `${base_path}${redirect_path}${next_search}${next_hash}`,
        )
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
