<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>前端代码实战网站</title>
  </head>
  <body>
    <div id="root">
      <div
        id="splash-screen"
        style="position: fixed; inset: 0; display: flex; align-items: center; justify-center; background-color: #f1f2f4; z-index: 9999;"
      >
        <div style="display: flex; flex-direction: column; align-items: center; gap: 16px">
          <div
            style="
              width: 48px;
              height: 48px;
              border-radius: 12px;
              background-color: #f59e0b;
              color: white;
              display: flex;
              align-items: center;
              justify-content: center;
              font-weight: 800;
              font-family: sans-serif;
              font-size: 20px;
              box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
            "
          >
            CF
          </div>
          <div
            style="
              width: 24px;
              height: 24px;
              border: 3px solid #e2e8f0;
              border-top-color: #f59e0b;
              border-radius: 50%;
              animation: spin 0.8s linear infinite;
            "
          ></div>
        </div>
      </div>
      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>
    <script>
      ;(function () {
        const base_path = '%BASE_URL%'.replace(/\/$/, '')
        const url = new URL(window.location.href)
        const redirect_path = url.searchParams.get('p')
        const redirect_query = url.searchParams.get('q')
        const redirect_hash = url.searchParams.get('h')

        if (!redirect_path) {
          return
        }

        url.searchParams.delete('p')
        url.searchParams.delete('q')
        url.searchParams.delete('h')

        const preserved_query = url.searchParams.toString()
        const next_search = redirect_query
          ? `?${redirect_query}${preserved_query ? `&${preserved_query}` : ''}`
          : preserved_query
            ? `?${preserved_query}`
            : ''
        const next_hash = redirect_hash ? `#${redirect_hash}` : ''

        window.history.replaceState(
          null,
          '',
          `${base_path}${redirect_path}${next_search}${next_hash}`,
        )
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
